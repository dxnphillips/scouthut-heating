###############################################################################
# SCOUT HUT – ROINTE HEATING AUTOMATION PACKAGE  v6
# Pelsall Scout Hut
# =============================================================================
#
# REMAINING PLACEHOLDERS  (everything else is fully configured)
# -------------------------------------------------------------
# Search for REPLACE_ME to find the items still needing your input:
#
#   climate.hall_back through _4  – Zone A (Hall) Rointe entities
#   climate.office             – Zone B (Office) Rointe entity
#   climate.kitchen             – Shared zone (toilets/kitchen) heater(s)
#   input_boolean.hall_motion_sensor                 – Zone A hall motion sensor
#   input_boolean.office_motion_sensor               – Zone B office motion sensor
#   climate.hall_back              – First Zone A heater (for drift detection)
#   climate.office              – First Zone B heater (for drift detection)
#
# All door/window sensors, calendars, and group logic are fully configured.
#
# ─────────────────────────────────────────────────────────────────────────────
# SENSOR LAYOUT  (Pelsall)
# ─────────────────────────────────────────────────────────────────────────────
#
#  Zone A (Hall)
#    Doors:   front_door, front_fire_door, rear_fire_door_left, rear_fire_door_right
#    Windows: hall_front_left, hall_front_right, hall_right_back,
#             hall_right_front, hall_right_middle
#    Internal door (shared with Zone B): office_internal_door
#
#  Zone B (Office)
#    Doors:   office_external_door + office_internal_door (shared with A)
#    Windows: office_window
#
#  Shared Zone (Toilets + Kitchen)
#    No heating zone per se – but pre-heats on either calendar event.
#    Windows: female_toilets_contact_sensor, gents_toilet_contact_sensor,
#             kitchen_contact_sensor
#    These do NOT affect Zone A or B heating – they are informational only
#    and feed the water heater automation.
#
#  Internal door (office_internal_door_contact_sensor):
#    NOT in any sensor group. Only triggers ice if an exterior opening is
#    also open (creating a heat-loss path to outside). If all exterior
#    doors and windows are closed, the internal door being open is harmless
#    – the two zones simply share air.
#
###############################################################################


###############################################################################
# SECTION 1 – HELPERS
###############################################################################

input_number:

  scout_preheat_minutes:
    name: "🏕 Pre-heat lead time (min)"
    min: 0
    max: 120
    step: 5
    initial: 120
    unit_of_measurement: "min"
    icon: mdi:radiator

  scout_motion_timeout_minutes:
    name: "🏕 No-motion eco timeout (min)"
    min: 5
    max: 60
    step: 5
    initial: 15
    unit_of_measurement: "min"
    icon: mdi:timer-outline

  scout_opening_ignore_minutes:
    name: "🏕 Opening: ignore if under (min)"
    min: 1
    max: 10
    step: 1
    initial: 3
    unit_of_measurement: "min"
    icon: mdi:clock-fast

  scout_door_ice_minutes:
    name: "🏕 Door: drop to ice after (min)"
    min: 2
    max: 30
    step: 1
    initial: 10
    unit_of_measurement: "min"
    icon: mdi:door-open

  scout_window_ice_minutes:
    name: "🏕 Window: drop to ice after (min)"
    min: 5
    max: 60
    step: 5
    initial: 10
    unit_of_measurement: "min"
    icon: mdi:window-open

  scout_seasonal_lockout_temp:
    name: "🏕 Seasonal lockout: 3-day avg threshold (°C)"
    min: 10
    max: 20
    step: 0.5
    initial: 15
    unit_of_measurement: "°C"
    icon: mdi:thermometer-chevron-up

  # ── Hall temperature targets ───────────────────────────────────────────────
  # These are applied to the Rointe number entities before the preset is set.
  # Changing them here takes effect at the next calendar pre-heat poll.
  scout_hall_comfort_temp:
    name: "🏕 Hall: Comfort temperature (°C)"
    min: 16
    max: 24
    step: 0.5
    initial: 22
    unit_of_measurement: "°C"
    icon: mdi:thermometer-high

  scout_hall_eco_temp:
    name: "🏕 Hall: Eco temperature (°C)"
    min: 10
    max: 20
    step: 0.5
    initial: 18
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low

  scout_hall_eco_low_temp:
    name: "🏕 Hall: Eco LOW temperature – ECO bookings (°C)"
    min: 8
    max: 18
    step: 0.5
    initial: 14
    unit_of_measurement: "°C"
    icon: mdi:thermometer-minus


input_select:

  scout_boost_duration:
    name: "🏕 Boost duration"
    options:
      - "30 min"
      - "60 min"
      - "90 min"
    initial: "60 min"
    icon: mdi:fire

  scout_zone_a_expected_preset:
    name: "🏕 Zone A – Expected preset"
    options: ["comfort", "eco", "ice", "unknown"]
    initial: "unknown"
    icon: mdi:thermometer-check

  scout_zone_b_expected_preset:
    name: "🏕 Zone B – Expected preset"
    options: ["comfort", "eco", "ice", "unknown"]
    initial: "unknown"
    icon: mdi:thermometer-check


input_boolean:

  scout_zone_a_automation_enabled:
    name: "🏕 Zone A (Hall) – Automation enabled"
    icon: mdi:calendar-check

  scout_zone_b_automation_enabled:
    name: "🏕 Zone B (Office) – Automation enabled"
    icon: mdi:calendar-check

  scout_zone_a_occupied_override:
    name: "🏕 Zone A (Hall) – Manual occupied override"
    icon: mdi:account-check

  scout_zone_b_occupied_override:
    name: "🏕 Zone B (Office) – Manual occupied override"
    icon: mdi:account-check

  scout_zone_a_boost_active:
    name: "🏕 Zone A (Hall) – Boost active"
    icon: mdi:fire

  scout_zone_b_boost_active:
    name: "🏕 Zone B (Office) – Boost active"
    icon: mdi:fire

  # Turning these on cancels a running boost immediately
  scout_zone_a_boost_cancel:
    name: "🏕 Zone A (Hall) – Cancel boost"
    icon: mdi:fire-off

  scout_zone_b_boost_cancel:
    name: "🏕 Zone B (Office) – Cancel boost"
    icon: mdi:fire-off

  scout_zone_a_manual_hold:
    name: "🏕 Zone A (Hall) – Manual hold (Rointe app override)"
    icon: mdi:hand-back-right

  scout_zone_b_manual_hold:
    name: "🏕 Zone B (Office) – Manual hold (Rointe app override)"
    icon: mdi:hand-back-right

  scout_seasonal_lockout_active:
    name: "🏕 Seasonal lockout active"
    icon: mdi:leaf

  scout_zone_a_opening_ice_active:
    name: "🏕 Zone A (Hall) – Opening ice active"
    icon: mdi:snowflake-alert

  scout_zone_b_opening_ice_active:
    name: "🏕 Zone B (Office) – Opening ice active"
    icon: mdi:snowflake-alert

  scout_shared_opening_ice_active:
    name: "🏕 Shared zone – Opening ice active"
    icon: mdi:snowflake-alert


input_datetime:

  # Last-seen motion timestamps – updated every time a motion sensor fires.
  # Used to track "was there motion recently?" rather than "is motion active now?"
  # which solves the pulse-only sensor problem.
  scout_last_motion_hall:
    name: "🏕 Last motion – Hall"
    has_date: true
    has_time: true

  scout_last_motion_office:
    name: "🏕 Last motion – Office"
    has_date: true
    has_time: true

  scout_last_motion_kitchen:
    name: "🏕 Last motion – Kitchen"
    has_date: true
    has_time: true

  scout_last_motion_gents:
    name: "🏕 Last motion – Gents"
    has_date: true
    has_time: true

  scout_last_motion_female:
    name: "🏕 Last motion – Female toilets"
    has_date: true
    has_time: true


input_text:

  scout_eco_keywords:
    name: "🏕 ECO keyword blocklist (comma-separated)"
    initial: "sal-vation,test"
    max: 255
    icon: mdi:format-list-bulleted


###############################################################################
# SECTION 2 – SENSOR GROUPS
#
# All contact sensors at Pelsall are input_boolean entities, so we use
# template binary_sensors to group them rather than the binary_sensor
# group platform (which only works with binary_sensor entities).
#
# Each group evaluates to ON if ANY member is open (ON), OFF if ALL closed.
###############################################################################

template:
  - binary_sensor:

      # ── Zone A (Hall) door group ──────────────────────────────────────────
      # 4 external hall doors only. Internal door is NOT included –
      # it only matters if an exterior opening is also open (see A12).
      - name: "Scout Zone A – Any exterior door open"
        unique_id: scout_zone_a_doors_group
        device_class: door
        state: >
          {{ is_state('input_boolean.front_door_contact_sensor', 'on')
             or is_state('input_boolean.front_fire_door_contact_sensor', 'on')
             or is_state('input_boolean.rear_fire_door_left_contact_sensor', 'on')
             or is_state('input_boolean.rear_fire_door_right_contact_sensor', 'on') }}

      # ── Zone A (Hall) window group ────────────────────────────────────────
      - name: "Scout Zone A – Any window open"
        unique_id: scout_zone_a_windows_group
        device_class: window
        state: >
          {{ is_state('input_boolean.hall_front_left_contact_sensor', 'on')
             or is_state('input_boolean.hall_front_right_contact_sensor', 'on')
             or is_state('input_boolean.hall_right_back_contact_sensor', 'on')
             or is_state('input_boolean.hall_right_front_contact_sensor', 'on')
             or is_state('input_boolean.hall_right_middle_contact_sensor', 'on') }}

      # ── Zone A (Hall) all openings – restore check ────────────────────────
      - name: "Scout Zone A – Any exterior opening open"
        unique_id: scout_zone_a_all_openings_group
        device_class: opening
        state: >
          {{ is_state('input_boolean.front_door_contact_sensor', 'on')
             or is_state('input_boolean.front_fire_door_contact_sensor', 'on')
             or is_state('input_boolean.rear_fire_door_left_contact_sensor', 'on')
             or is_state('input_boolean.rear_fire_door_right_contact_sensor', 'on')
             or is_state('input_boolean.hall_front_left_contact_sensor', 'on')
             or is_state('input_boolean.hall_front_right_contact_sensor', 'on')
             or is_state('input_boolean.hall_right_back_contact_sensor', 'on')
             or is_state('input_boolean.hall_right_front_contact_sensor', 'on')
             or is_state('input_boolean.hall_right_middle_contact_sensor', 'on') }}

      # ── Zone B (Office) door group ────────────────────────────────────────
      - name: "Scout Zone B – Any exterior door open"
        unique_id: scout_zone_b_doors_group
        device_class: door
        state: >
          {{ is_state('input_boolean.office_external_door_contact_sensor', 'on') }}

      # ── Zone B (Office) window group ──────────────────────────────────────
      - name: "Scout Zone B – Any window open"
        unique_id: scout_zone_b_windows_group
        device_class: window
        state: >
          {{ is_state('input_boolean.office_window_contact_sensor', 'on') }}

      # ── Zone B (Office) all openings ──────────────────────────────────────
      - name: "Scout Zone B – Any exterior opening open"
        unique_id: scout_zone_b_all_openings_group
        device_class: opening
        state: >
          {{ is_state('input_boolean.office_external_door_contact_sensor', 'on')
             or is_state('input_boolean.office_window_contact_sensor', 'on') }}

      # ── Outdoor RealFeel warm flag ─────────────────────────────────────────
      - name: "Scout – Feels warm outside (RealFeel)"
        unique_id: scout_outdoor_is_warm
        state: >
          {{ states('sensor.1st_pelsall_scouts_realfeel_temperature') | float(0)
             >= states('input_number.scout_seasonal_lockout_temp') | float(15) }}

  - sensor:
      # ── Current outdoor temperature ───────────────────────────────────────
      - name: "Scout – Outdoor temp (current)"
        unique_id: scout_outdoor_temp_current
        unit_of_measurement: "°C"
        state: >
          {{ state_attr('weather.1st_pelsall_scouts', 'temperature') | float(0) }}


script:

  scout_set_zone_a_preset:
    alias: "Scout – Set Zone A (Hall) preset"
    mode: restart
    fields:
      preset:
        description: "comfort, eco or ice"
      from_boost:
        description: "true to bypass seasonal lockout (boost use only)"
    sequence:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_a_automation_enabled
                state: "off"
            sequence:
              - service: system_log.write
                data:
                  message: "Scout Zone A: automation disabled, skipping"
                  level: debug

          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_a_manual_hold
                state: "on"
            sequence:
              - service: system_log.write
                data:
                  message: "Scout Zone A: manual hold active, skipping"
                  level: debug

          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_a_boost_active
                state: "on"
              - condition: template
                value_template: "{{ not (from_boost | default(false)) }}"
            sequence:
              - service: system_log.write
                data:
                  message: "Scout Zone A: boost active, skipping lower-priority call"
                  level: debug

          - conditions:
              - condition: state
                entity_id: input_boolean.scout_seasonal_lockout_active
                state: "on"
              - condition: template
                value_template: >
                  {{ preset != 'ice' and not (from_boost | default(false)) }}
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id:
                    - climate.hall_back
                    - climate.hall_front
                    - climate.hall_left
                    - climate.hall_right
                data:
                  preset_mode: ice
              - service: input_select.select_option
                target:
                  entity_id: input_select.scout_zone_a_expected_preset
                data:
                  option: ice

          - conditions:
              - condition: template
                value_template: "{{ preset in ['comfort','eco','ice'] }}"
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id:
                    - climate.hall_back
                    - climate.hall_front
                    - climate.hall_left
                    - climate.hall_right
                data:
                  preset_mode: "{{ preset }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.scout_zone_a_expected_preset
                data:
                  option: "{{ preset }}"

  scout_set_zone_b_preset:
    alias: "Scout – Set Zone B (Office) preset"
    mode: restart
    fields:
      preset:
        description: "comfort, eco or ice"
      from_boost:
        description: "true to bypass seasonal lockout (boost use only)"
    sequence:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_b_automation_enabled
                state: "off"
            sequence:
              - service: system_log.write
                data:
                  message: "Scout Zone B: automation disabled, skipping"
                  level: debug

          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_b_manual_hold
                state: "on"
            sequence:
              - service: system_log.write
                data:
                  message: "Scout Zone B: manual hold active, skipping"
                  level: debug

          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_b_boost_active
                state: "on"
              - condition: template
                value_template: "{{ not (from_boost | default(false)) }}"
            sequence:
              - service: system_log.write
                data:
                  message: "Scout Zone B: boost active, skipping lower-priority call"
                  level: debug

          - conditions:
              - condition: state
                entity_id: input_boolean.scout_seasonal_lockout_active
                state: "on"
              - condition: template
                value_template: >
                  {{ preset != 'ice' and not (from_boost | default(false)) }}
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id:
                    - climate.office
                data:
                  preset_mode: ice
              - service: input_select.select_option
                target:
                  entity_id: input_select.scout_zone_b_expected_preset
                data:
                  option: ice

          - conditions:
              - condition: template
                value_template: "{{ preset in ['comfort','eco','ice'] }}"
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id:
                    - climate.office
                data:
                  preset_mode: "{{ preset }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.scout_zone_b_expected_preset
                data:
                  option: "{{ preset }}"

  # ---------------------------------------------------------------------------
  # scout_restore_zone_a / _b
  # Resolves what the zone should currently be running and applies it.
  # ---------------------------------------------------------------------------
  scout_restore_zone_a:
    alias: "Scout – Restore Zone A (Hall) to correct preset"
    mode: single
    sequence:
      - variables:
          cal_on:      "{{ is_state('calendar.pelsall_hall_bookings', 'on') }}"
          manual_on:   "{{ is_state('input_boolean.scout_zone_a_occupied_override', 'on') }}"
          boost_on:    "{{ is_state('input_boolean.scout_zone_a_boost_active', 'on') }}"
          event_title: "{{ state_attr('calendar.pelsall_hall_bookings', 'message') | default('') | lower }}"
          eco_keywords: >
            {{ states('input_text.scout_eco_keywords').split(',') | map('trim') | list }}
          restore_preset: >
            {% if boost_on %}
              comfort
            {% elif cal_on %}
              {% set found = eco_keywords | select('in', event_title) | list %}
              {{ 'eco' if found | length > 0 else 'comfort' }}
            {% elif manual_on %}
              eco
            {% else %}
              ice
            {% endif %}
      - service: script.scout_set_zone_a_preset
        data:
          preset: "{{ restore_preset }}"

  scout_restore_zone_b:
    alias: "Scout – Restore Zone B (Office) to correct preset"
    mode: single
    sequence:
      - variables:
          cal_on:      "{{ is_state('calendar.pelsall_office_bookings', 'on') }}"
          manual_on:   "{{ is_state('input_boolean.scout_zone_b_occupied_override', 'on') }}"
          boost_on:    "{{ is_state('input_boolean.scout_zone_b_boost_active', 'on') }}"
          event_title: "{{ state_attr('calendar.pelsall_office_bookings', 'message') | default('') | lower }}"
          eco_keywords: >
            {{ states('input_text.scout_eco_keywords').split(',') | map('trim') | list }}
          restore_preset: >
            {% if boost_on %}
              comfort
            {% elif cal_on %}
              {% set found = eco_keywords | select('in', event_title) | list %}
              {{ 'eco' if found | length > 0 else 'comfort' }}
            {% elif manual_on %}
              eco
            {% else %}
              ice
            {% endif %}
      - service: script.scout_set_zone_b_preset
        data:
          preset: "{{ restore_preset }}"

  # ---------------------------------------------------------------------------
  # Dashboard boost entry points
  # ---------------------------------------------------------------------------
  scout_boost_zone_a:
    alias: "Scout – Boost Zone A (Hall)"
    sequence:
      - event: scout_boost_zone_a

  scout_boost_zone_b:
    alias: "Scout – Boost Zone B (Office)"
    sequence:
      - event: scout_boost_zone_b

  # ---------------------------------------------------------------------------
  # scout_apply_hall_temperatures
  #   Sets the eco/comfort temperature on all hall heaters to match the
  #   configured helpers, then re-applies the current preset so the new
  #   temperature takes effect immediately.
  #   Called by the calendar pre-heat automation before applying a preset.
  #   Fields:
  #     preset      – comfort | eco | eco_low (eco_low uses the low eco temperature)
  # ---------------------------------------------------------------------------
  scout_apply_hall_temperatures:
    alias: "Scout – Set hall temperatures and reapply preset"
    mode: restart
    fields:
      preset:
        description: "comfort, eco or eco_low – eco_low uses the low eco temperature"
    sequence:
      - variables:
          comfort_temp: "{{ states('input_number.scout_hall_comfort_temp') | float(22) }}"
          eco_temp:     "{{ states('input_number.scout_hall_eco_temp') | float(18) }}"
          eco_low_temp: "{{ states('input_number.scout_hall_eco_low_temp') | float(14) }}"
          # Select eco temperature based on preset string, not a boolean flag
          active_eco_temp: >
            {{ eco_low_temp if preset == 'eco_low' else eco_temp }}

      # Set comfort temperature on all hall heaters
      - service: number.set_value
        target:
          entity_id:
            - number.hall_back_comfort_temperature
            - number.hall_front_comfort_temperature
            - number.hall_left_comfort_temperature
            - number.hall_right_comfort_temperature
        data:
          value: "{{ comfort_temp }}"

      # Set eco temperature on all hall heaters
      # (uses the low temp for ECO keyword bookings, normal eco otherwise)
      - service: number.set_value
        target:
          entity_id:
            - number.hall_back_eco_temperature
            - number.hall_front_eco_temperature
            - number.hall_left_eco_temperature
            - number.hall_right_eco_temperature
        data:
          value: "{{ active_eco_temp }}"

      # Reapply the preset so the new temperatures take effect immediately
      # Map eco_low → eco preset (same preset, just different temperature)
      - service: script.scout_set_zone_a_preset
        data:
          preset: "{{ 'eco' if preset == 'eco_low' else preset }}"


###############################################################################
# SECTION 5 – AUTOMATIONS
###############################################################################

automation:

  ###########################################################################
  # A1 – CALENDAR PRE-HEAT  Zone A (Hall)
  # Uses calendar.get_events to fetch all events in the pre-heat window
  # rather than relying on state attributes which only expose the next event.
  ###########################################################################
  - id: scout_calendar_zone_a_preheat
    alias: "[Calendar] Hall: Pre-heat"
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: state
        entity_id: input_boolean.scout_zone_a_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.scout_zone_a_manual_hold
        state: "off"
      - condition: state
        entity_id: input_boolean.scout_zone_a_opening_ice_active
        state: "off"
    action:
      - service: calendar.get_events
        target:
          entity_id: calendar.pelsall_hall_bookings
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          end_date_time: "{{ (now() + timedelta(minutes=states('input_number.scout_preheat_minutes') | int(120))).strftime('%Y-%m-%d %H:%M:%S') }}"
        response_variable: hall_events
      - variables:
          eco_keywords: >
            {{ states('input_text.scout_eco_keywords').split(',') | map('trim') | list }}
          events_list: "{{ hall_events['calendar.pelsall_hall_bookings']['events'] | default([]) }}"
          current_event_title: >
            {{ state_attr('calendar.pelsall_hall_bookings', 'message') | default('') | lower
               if is_state('calendar.pelsall_hall_bookings', 'on') else '' }}
          event_title: >
            {% if is_state('calendar.pelsall_hall_bookings', 'on') %}
              {{ current_event_title }}
            {% elif events_list | length > 0 %}
              {{ events_list[0].summary | default('') | lower }}
            {% else %}
              {{ '' }}
            {% endif %}
          in_window: >
            {{ is_state('calendar.pelsall_hall_bookings', 'on') or events_list | length > 0 }}
          is_eco_booking: >
            {% set found = eco_keywords | select('in', event_title) | list %}
            {{ found | length > 0 }}
          desired_preset: >
            {% if in_window %}
              {% set found = eco_keywords | select('in', event_title) | list %}
              {{ 'eco' if found | length > 0 else 'comfort' }}
            {% else %}
              ice
            {% endif %}
          motion_recent: >
            {% set timeout = states('input_number.scout_motion_timeout_minutes') | int(15) * 60 %}
            {% set now_ts = as_timestamp(now()) %}
            {% set sensors = [
                 'input_datetime.scout_last_motion_hall',
                 'input_datetime.scout_last_motion_office',
                 'input_datetime.scout_last_motion_kitchen',
                 'input_datetime.scout_last_motion_gents',
                 'input_datetime.scout_last_motion_female'
               ] %}
            {% set last_any = sensors
                 | map('states')
                 | reject('eq', 'unknown')
                 | map('as_timestamp')
                 | list %}
            {{ last_any | length > 0 and (now_ts - (last_any | max)) <= timeout }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ desired_preset != 'ice' }}"
            sequence:
              - service: script.scout_apply_hall_temperatures
                data:
                  preset: "{{ 'eco_low' if is_eco_booking else desired_preset }}"
          - conditions:
              - condition: template
                value_template: "{{ desired_preset == 'ice' and not motion_recent }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id:
                    - number.hall_back_eco_temperature
                    - number.hall_front_eco_temperature
                    - number.hall_left_eco_temperature
                    - number.hall_right_eco_temperature
                data:
                  value: "{{ states('input_number.scout_hall_eco_temp') | float(18) }}"
              - service: script.scout_set_zone_a_preset
                data:
                  preset: ice

  ###########################################################################
  # A2 – CALENDAR PRE-HEAT  Zone B (Office)
  ###########################################################################
  - id: scout_calendar_zone_b_preheat
    alias: "[Calendar] Office: Pre-heat"
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: state
        entity_id: input_boolean.scout_zone_b_automation_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.scout_zone_b_manual_hold
        state: "off"
      - condition: state
        entity_id: input_boolean.scout_zone_b_opening_ice_active
        state: "off"
    action:
      - service: calendar.get_events
        target:
          entity_id: calendar.pelsall_office_bookings
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          end_date_time: "{{ (now() + timedelta(minutes=states('input_number.scout_preheat_minutes') | int(120))).strftime('%Y-%m-%d %H:%M:%S') }}"
        response_variable: office_events
      - variables:
          eco_keywords: >
            {{ states('input_text.scout_eco_keywords').split(',') | map('trim') | list }}
          events_list: "{{ office_events['calendar.pelsall_office_bookings']['events'] | default([]) }}"
          current_event_title: >
            {{ state_attr('calendar.pelsall_office_bookings', 'message') | default('') | lower
               if is_state('calendar.pelsall_office_bookings', 'on') else '' }}
          event_title: >
            {% if is_state('calendar.pelsall_office_bookings', 'on') %}
              {{ current_event_title }}
            {% elif events_list | length > 0 %}
              {{ events_list[0].summary | default('') | lower }}
            {% else %}
              {{ '' }}
            {% endif %}
          in_window: >
            {{ is_state('calendar.pelsall_office_bookings', 'on') or events_list | length > 0 }}
          desired_preset: >
            {% if in_window %}
              {% set found = eco_keywords | select('in', event_title) | list %}
              {{ 'eco' if found | length > 0 else 'comfort' }}
            {% else %}
              ice
            {% endif %}
          motion_recent: >
            {% set timeout = states('input_number.scout_motion_timeout_minutes') | int(15) * 60 %}
            {% set now_ts = as_timestamp(now()) %}
            {% set sensors = [
                 'input_datetime.scout_last_motion_hall',
                 'input_datetime.scout_last_motion_office',
                 'input_datetime.scout_last_motion_kitchen',
                 'input_datetime.scout_last_motion_gents',
                 'input_datetime.scout_last_motion_female'
               ] %}
            {% set last_any = sensors
                 | map('states')
                 | reject('eq', 'unknown')
                 | map('as_timestamp')
                 | list %}
            {{ last_any | length > 0 and (now_ts - (last_any | max)) <= timeout }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ desired_preset != 'ice' or not motion_recent }}"
            sequence:
              - service: script.scout_set_zone_b_preset
                data:
                  preset: "{{ desired_preset }}" 

  ###########################################################################
  # A3 – SHARED ZONE PRE-HEAT  (Toilets + Kitchen)
  #
  # Turns on shared zone heaters when EITHER calendar has an event in the
  # pre-heat window. Turns off when both calendars are inactive.
  # Not affected by door/window sensors or seasonal lockout.
  ###########################################################################
  - id: scout_calendar_shared_zone_preheat
    alias: "[Calendar] Shared zone: Pre-heat"
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition: []
    action:
      - service: calendar.get_events
        target:
          entity_id:
            - calendar.pelsall_hall_bookings
            - calendar.pelsall_office_bookings
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          end_date_time: "{{ (now() + timedelta(minutes=states('input_number.scout_preheat_minutes') | int(120))).strftime('%Y-%m-%d %H:%M:%S') }}"
        response_variable: shared_events
      - variables:
          a_events: "{{ shared_events['calendar.pelsall_hall_bookings']['events'] | default([]) }}"
          b_events: "{{ shared_events['calendar.pelsall_office_bookings']['events'] | default([]) }}"
          a_in_window: >
            {{ is_state('calendar.pelsall_hall_bookings', 'on') or a_events | length > 0 }}
          b_in_window: >
            {{ is_state('calendar.pelsall_office_bookings', 'on') or b_events | length > 0 }}
          either_in_window: "{{ a_in_window or b_in_window }}"
      - variables:
          motion_recent: >
            {% set timeout = states('input_number.scout_motion_timeout_minutes') | int(15) * 60 %}
            {% set now_ts = as_timestamp(now()) %}
            {% set sensors = [
                 'input_datetime.scout_last_motion_hall',
                 'input_datetime.scout_last_motion_office',
                 'input_datetime.scout_last_motion_kitchen',
                 'input_datetime.scout_last_motion_gents',
                 'input_datetime.scout_last_motion_female'
               ] %}
            {% set last_any = sensors
                 | map('states')
                 | reject('eq', 'unknown')
                 | map('as_timestamp')
                 | list %}
            {{ last_any | length > 0 and (now_ts - (last_any | max)) <= timeout }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ either_in_window }}"
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id:
                    - climate.kitchen
                    - climate.gents_toilet
                    - climate.ladies_toilet
                data:
                  preset_mode: eco
          # Only revert to ice if no booking AND no recent motion
          - conditions:
              - condition: template
                value_template: "{{ not either_in_window and not motion_recent }}"
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id:
                    - climate.kitchen
                    - climate.gents_toilet
                    - climate.ladies_toilet
                data:
                  preset_mode: ice

  ###########################################################################
  # A4 / A5 – EVENT ENDED → CLEAR MANUAL HOLD + REVERT
  ###########################################################################
  - id: scout_event_end_zone_a
    alias: "[Calendar] Hall: Event ended"
    trigger:
      - platform: state
        entity_id: calendar.pelsall_hall_bookings
        from: "on"
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.scout_zone_a_automation_enabled
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.scout_zone_a_manual_hold
      - service: persistent_notification.dismiss
        data:
          notification_id: scout_zone_a_manual_hold
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_a_boost_active
                state: "off"
              - condition: state
                entity_id: input_boolean.scout_zone_a_occupied_override
                state: "off"
              - condition: state
                entity_id: input_boolean.scout_zone_a_opening_ice_active
                state: "off"
            sequence:
              - service: script.scout_set_zone_a_preset
                data:
                  preset: ice

  - id: scout_event_end_zone_b
    alias: "[Calendar] Office: Event ended"
    trigger:
      - platform: state
        entity_id: calendar.pelsall_office_bookings
        from: "on"
        to: "off"
    condition:
      - condition: state
        entity_id: input_boolean.scout_zone_b_automation_enabled
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.scout_zone_b_manual_hold
      - service: persistent_notification.dismiss
        data:
          notification_id: scout_zone_b_manual_hold
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.scout_zone_b_boost_active
                state: "off"
              - condition: state
                entity_id: input_boolean.scout_zone_b_occupied_override
                state: "off"
              - condition: state
                entity_id: input_boolean.scout_zone_b_opening_ice_active
                state: "off"
            sequence:
              - service: script.scout_set_zone_b_preset
                data:
                  preset: ice

  ###########################################################################
  # A6 – ZONE A DOORS HELD OPEN → ICE
  # Uses wait_for_trigger so the timeout reads the helper value at runtime.
  # mode: restart means re-opening a door resets the timer.
  ###########################################################################
  - id: scout_zone_a_door_open_ice
    alias: "[Openings] Hall: Door held open → ice"
    mode: restart
    trigger:
      - platform: state
        entity_id: binary_sensor.scout_zone_a_doors_group
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.scout_zone_a_automation_enabled
        state: "on"
    action:
      - variables:
          ice_mins: "{{ states('input_number.scout_door_ice_minutes') | int(10) }}"
      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.scout_zone_a_doors_group
            to: "off"
        timeout:
          minutes: "{{ ice_mins }}"
        continue_on_timeout: true
      - condition: state
        entity_id: binary_sensor.scout_zone_a_doors_group
        state: "on"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.scout_zone_a_opening_ice_active
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.scout_zone_a_manual_hold
      - service: climate.set_preset_mode
        target:
          entity_id:
            - climate.hall_back
            - climate.hall_front
            - climate.hall_left
            - climate.hall_right
        data:
          preset_mode: ice
      - service: persistent_notification.create
        data:
          title: "🏕 Hall – Heating paused (door open)"
          message: >
            A hall door has been open for {{ ice_mins }} minutes.
            Heating is paused and will restore when all doors and windows are closed.
          notification_id: scout_zone_a_opening_ice

  ###########################################################################
  # A7 – ZONE A WINDOWS HELD OPEN → ICE
  ###########################################################################
  - id: scout_zone_a_window_open_ice
